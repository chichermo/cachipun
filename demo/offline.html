<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cachupin · Sin conexion</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .container {
        max-width: 640px;
        margin: 0 auto;
        padding: 80px 20px;
        text-align: center;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 10px;
      }
      p {
        color: #475569;
      }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 16px;
        border-radius: 10px;
        background: #0f766e;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Estas sin conexion</h1>
        <p>
          La demo de Cachupin requiere internet para cargar algunos contenidos.
          Cuando vuelvas a estar en linea, recarga la pagina.
        </p>
        <a href="/demo/">Volver a la demo</a>
      </div>
    </div>
  </body>
</html>
